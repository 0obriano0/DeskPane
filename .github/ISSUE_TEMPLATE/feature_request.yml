name: Feature request
description: Suggest an improvement or new DeskPane capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to build, and what is missing today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API, behavior, or demo you would like to see.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Core WindowManager
        - Desktop / Dock / Icons
        - WorkspaceManager
        - TaskView
        - BorderLayout
        - Themes / CSS
        - Vue adapter
        - React adapter
        - Documentation / demos
        - Build / package exports
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: examples
    attributes:
      label: Examples or references
      description: Links, screenshots, similar libraries, or a small pseudo-code sample.

