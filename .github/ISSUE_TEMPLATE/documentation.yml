name: Documentation issue
description: Report missing, confusing, or outdated docs
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: dropdown
    id: location
    attributes:
      label: Location
      options:
        - README
        - demo/docs
        - demo/vue
        - demo/react
        - API types
        - Release notes / changelog
        - Other
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: What is unclear or missing?
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement

  - type: input
    id: page
    attributes:
      label: Link or file path
      placeholder: "README.md#css-loading or demo/docs/src/pages/WorkspacePage.vue"

