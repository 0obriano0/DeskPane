<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebOS Theme Editor</title>
  <link rel="stylesheet" href="../shared/base.css" />
  <style>
    body {
      overflow: hidden; height: 100vh;
      display: flex; flex-direction: column;
      padding-top: var(--d-header-h); /* push below fixed .dh header */
    }
    .te-layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Tabs ─────────────────────────────────────────── */
    .tab-bar {
      display: flex; gap: 2px; padding: 8px 12px 0;
      background: var(--d-panel); border-bottom: 1px solid var(--d-border); flex-shrink: 0;
    }
    .tab-btn {
      padding: 6px 18px; border-radius: 6px 6px 0 0;
      border: 1px solid transparent; border-bottom: none;
      background: transparent; color: var(--d-text-dim);
      font-size: 12px; font-weight: 500; cursor: pointer;
      transition: background .15s, color .15s;
      position: relative; bottom: -1px;
    }
    .tab-btn:hover { background: rgba(255,255,255,.05); color: var(--d-text); }
    .tab-btn.active {
      background: var(--d-bg); color: var(--d-text);
      border-color: var(--d-border);
      border-bottom-color: var(--d-bg);
    }
    .tab-badge {
      display: inline-block; font-size: 9px; padding: 1px 5px;
      border-radius: 10px; margin-left: 5px; vertical-align: middle;
    }
    .tab-badge.core    { background: rgba(59,130,246,.25);  color: #93c5fd; }
    .tab-badge.desktop { background: rgba(139,92,246,.25);  color: #c4b5fd; }
    .tab-pane { display: none; flex: 1; overflow: hidden; }
    .tab-pane.active  { display: flex; }

    /* ── Shared editor layout ─────────────────────────── */
    .editor-panel {
      width: 340px; flex-shrink: 0;
      background: var(--d-panel); border-right: 1px solid var(--d-border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .editor-scroll {
      flex: 1; overflow-y: auto; padding: 14px 12px;
    }
    .editor-scroll::-webkit-scrollbar { width: 5px; }
    .editor-scroll::-webkit-scrollbar-track { background: transparent; }
    .editor-scroll::-webkit-scrollbar-thumb { background: var(--d-border); border-radius: 3px; }

    .var-group { margin-bottom: 18px; }
    .var-group-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.2px; color: rgba(226,232,240,.45);
      margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid var(--d-border);
    }
    .var-row {
      display: grid; grid-template-columns: 1fr auto;
      align-items: center; gap: 8px; margin-bottom: 8px;
    }
    .var-label {
      font-size: 11px; color: rgba(226,232,240,.55);
      font-family: 'Consolas','Fira Code',monospace;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .var-label[title] { cursor: help; }
    .var-inputs { display: flex; align-items: center; gap: 5px; }

    /* Live preview swatch for text-type vars */
    .var-preview {
      width: 26px; height: 26px; flex-shrink: 0;
      border-radius: 5px; border: 1px solid rgba(255,255,255,.14);
      cursor: default;
    }

    /* Module banner */
    .module-banner {
      padding: 7px 12px; flex-shrink: 0;
      display: flex; align-items: center; gap: 7px;
      font-size: 11px; font-weight: 600; letter-spacing: .3px;
      border-bottom: 1px solid;
    }
    .module-banner.core    { background: rgba(59,130,246,.10); color: #93c5fd; border-color: rgba(59,130,246,.22); }
    .module-banner.desktop { background: rgba(139,92,246,.12); color: #c4b5fd; border-color: rgba(139,92,246,.28); }
    .module-banner code {
      font-size: 10px; opacity: .7; font-family: 'Consolas','Fira Code',monospace;
    }

    input[type="color"] {
      width: 30px; height: 26px; border: 1px solid rgba(255,255,255,.12);
      border-radius: 5px; background: rgba(255,255,255,.05);
      cursor: pointer; padding: 2px; flex-shrink: 0;
    }
    input[type="text"].hex-input {
      width: 78px; padding: 4px 7px;
      border: 1px solid rgba(255,255,255,.12); border-radius: 5px;
      background: rgba(255,255,255,.05); color: var(--d-text);
      font-size: 11px; font-family: 'Consolas','Fira Code',monospace; outline: none;
    }
    input[type="text"].text-input {
      width: 170px; padding: 4px 7px;
      border: 1px solid rgba(255,255,255,.12); border-radius: 5px;
      background: rgba(255,255,255,.05); color: var(--d-text);
      font-size: 11px; font-family: 'Consolas','Fira Code',monospace; outline: none;
    }
    input[type="text"]:focus, input[type="color"]:focus { border-color: var(--d-accent); }

    /* Export footer */
    .export-panel {
      border-top: 1px solid var(--d-border); padding: 10px 12px; flex-shrink: 0;
    }
    .export-panel-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: rgba(226,232,240,.45); margin-bottom: 8px;
    }
    .export-btns { display: flex; gap: 7px; }
    .copy-feedback { font-size: 11px; color: #22c55e; margin-top: 5px; min-height: 15px; transition: opacity .3s; }

    /* ── Preview panel (Core) ─────────────────────────── */
    .preview-panel {
      flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #0b0f1a;
    }
    .preview-toolbar {
      display: flex; align-items: center; gap: 10px; padding: 7px 14px;
      flex-shrink: 0; background: var(--d-panel); border-bottom: 1px solid var(--d-border);
    }
    .preview-toolbar-title { font-size: 12px; color: var(--d-text-dim); font-weight: 500; }
    .preview-bg-label { font-size: 11px; color: var(--d-text-dim); margin-left: auto; }
    .bg-select {
      padding: 4px 8px; border: 1px solid rgba(255,255,255,.12); border-radius: 5px;
      background: rgba(255,255,255,.05); color: var(--d-text); font-size: 11px; cursor: pointer;
    }
    #core-preview-area { flex: 1; position: relative; overflow: hidden; }
    #core-preview-area.bg-dark  { background: #0b0f1a; }
    #core-preview-area.bg-light { background: #e8eaf0; }
    #core-preview-area.bg-grid  {
      background-color: #0b0f1a;
      background-image: linear-gradient(rgba(59,130,246,.07) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(59,130,246,.07) 1px, transparent 1px);
      background-size: 32px 32px;
    }
    #core-preview-area .wos-window { position: absolute !important; }

    /* ── Desktop tab ──────────────────────────────────── */
    #desktop-preview-area {
      flex: 1; position: relative; overflow: hidden;
    }
    /* Desktop notice banner */
    .desktop-notice {
      padding: 10px 14px; background: rgba(139,92,246,.15);
      border-bottom: 1px solid rgba(139,92,246,.3);
      font-size: 11px; color: #c4b5fd; flex-shrink: 0;
      display: flex; align-items: center; gap: 10px;
    }
    .desktop-notice a { color: #a78bfa; text-underline-offset: 2px; }
    .desktop-load-btn {
      margin-left: auto; padding: 4px 12px; border-radius: 5px;
      border: 1px solid rgba(139,92,246,.6); background: rgba(139,92,246,.2);
      color: #c4b5fd; font-size: 11px; cursor: pointer; white-space: nowrap;
    }
    .desktop-load-btn:hover { background: rgba(139,92,246,.35); }
    /* mock desktop (when desktop js not loaded) */
    .desktop-mock {
      width: 100%; height: 100%;
      background: var(--wos-desktop-bg, linear-gradient(135deg,#1a2a4a,#0d1b2a));
      position: relative; overflow: hidden;
    }
    .mock-dock {
      position: absolute; bottom: 0; left: 0; right: 0; height: 64px;
      background: var(--wos-dock-bg, rgba(20,30,50,0.75));
      backdrop-filter: blur(14px); border-top: 1px solid rgba(255,255,255,.1);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .mock-dock-item {
      width: 44px; height: 44px; border-radius: 10px;
      background: rgba(255,255,255,.12); display: flex; align-items: center;
      justify-content: center; font-size: 24px; flex-direction: column; gap: 2px;
    }
    .mock-dock-label { font-size: 9px; color: var(--wos-desktop-icon-text, #fff); opacity: .8; }
    .mock-icon {
      position: absolute; display: flex; flex-direction: column;
      align-items: center; gap: 4px; padding: 6px; border-radius: 8px;
    }
    .mock-icon:hover { background: rgba(255,255,255,.12); }
    .mock-icon span:first-child { font-size: 32px; }
    .mock-icon-label { font-size: 10px; color: var(--wos-desktop-icon-text, #fff); text-shadow: 0 1px 3px rgba(0,0,0,.7); }
  </style>
</head>
<body>

<header class="dh">
  <a class="dh-back" href="../index.html">← Demo</a>
  <span class="dh-logo">🎨</span>
  <span class="dh-title">Theme Editor</span>
  <span class="dh-badge b-tool">Dev Tool</span>
  <div class="dh-sep"></div>
  <div class="dh-actions" style="gap:6px">
    <span style="font-size:11px;color:rgba(226,232,240,.4);margin-right:2px">Presets:</span>
    <button class="d-btn" id="btn-preset-dark">🌙 Dark</button>
    <button class="d-btn" id="btn-preset-light">☀️ Light</button>
    <button class="d-btn" id="btn-preset-blue">🔷 Blue</button>
    <button class="d-btn" id="btn-preset-solarized">🌅 Solarized</button>
  </div>
</header>

<!-- Tabs -->
<div class="tab-bar" id="main-tab-bar">
  <button class="tab-btn active" data-tab="core">
    🪟 Core <span class="tab-badge core">--wos-*</span>
  </button>
  <button class="tab-btn" data-tab="desktop">
    🖥 Desktop <span class="tab-badge desktop">--wos-desktop-*</span>
  </button>
</div>

<!-- ════════════════ CORE TAB ════════════════ -->
<div class="tab-pane active" id="pane-core">
  <div class="te-layout">
    <div class="editor-panel">
      <div class="module-banner core">🪟 <span>Core</span> <code>webos-core.umd.js</code></div>
      <div class="editor-scroll" id="core-editor-scroll"></div>
      <div class="export-panel">
        <div class="export-panel-title">📤 匯出 Core 主題</div>
        <div class="export-btns">
          <button class="d-btn d-btn-accent" id="btn-copy-core">📋 複製 CSS</button>
          <button class="d-btn" id="btn-download-core">💾 下載 .css</button>
        </div>
        <div class="copy-feedback" id="copy-feedback-core"></div>
      </div>
    </div>
    <div class="preview-panel">
      <div class="preview-toolbar">
        <span class="preview-toolbar-title">👁 視窗即時預覽</span>
        <span class="preview-bg-label">背景：</span>
        <select class="bg-select" id="bg-select-core">
          <option value="bg-dark">深色</option>
          <option value="bg-grid" selected>格線</option>
          <option value="bg-light">淺色</option>
        </select>
      </div>
      <div id="core-preview-area" class="bg-grid"></div>
    </div>
  </div>
</div>

<!-- ════════════════ DESKTOP TAB ════════════════ -->
<div class="tab-pane" id="pane-desktop">
  <div class="te-layout" style="flex-direction:column">
    <!-- Notice banner -->
    <div class="desktop-notice" id="desktop-notice">
      <span>⚠️ Desktop 分頁需要載入 <code>webos-desktop.umd.js</code> 才能顯示真實預覽。不載入時顯示 Mock 預覽。</span>
      <button class="desktop-load-btn" id="btn-load-desktop">⬇ 載入 webos-desktop.js</button>
    </div>
    <!-- Main layout -->
    <div class="te-layout" style="flex:1">
      <div class="editor-panel">
        <div class="module-banner desktop">🖥 <span>Desktop</span> <code>webos-desktop.umd.js</code></div>
        <div class="editor-scroll" id="desktop-editor-scroll"></div>
        <div class="export-panel">
          <div class="export-panel-title">📤 匯出 Desktop 主題</div>
          <div class="export-btns">
            <button class="d-btn d-btn-accent" id="btn-copy-desktop">📋 複製 CSS</button>
            <button class="d-btn" id="btn-download-desktop">💾 下載 .css</button>
          </div>
          <div class="copy-feedback" id="copy-feedback-desktop"></div>
        </div>
      </div>
      <div class="preview-panel">
        <div class="preview-toolbar">
          <span class="preview-toolbar-title">🖥 桌面即時預覽</span>
          <span class="preview-bg-label" style="margin-left:auto">Dock：</span>
          <select class="bg-select" id="dock-position-select" disabled>
            <option value="bottom" selected>底部 ↓</option>
            <option value="top">頂部 ↑</option>
            <option value="left">左側 ←</option>
            <option value="right">右側 →</option>
          </select>
          <label style="font-size:11px;color:var(--d-muted);display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none">
            <input type="checkbox" id="dock-labels-toggle" checked disabled style="cursor:pointer">
            標籤
          </label>
          <span id="desktop-preview-status" style="font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(239,68,68,.15);color:#fca5a5">Mock 預覽</span>
        </div>
        <div id="desktop-preview-area">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../../dist/webos-core.umd.js"></script>

      '--wos-btn-hover-bg':         '#073642',
      '--wos-btn-close-hover-bg':   '#dc322f',
      '--wos-btn-close-hover-color':'#fdf6e3',
      '--wos-body-bg':              '#002b36',
      '--wos-body-color':           '#839496',
      '--wos-snap-guide-color':     'rgba(38,139,210,0.70)',
    },
    desktop: {
      '--wos-desktop-bg':        'linear-gradient(135deg,#002b36 0%,#073642 100%)',
      '--wos-desktop-icon-text': '#839496',
      '--wos-dock-bg':           'rgba(0,43,54,0.85)',
      '--wos-dock-border':       'rgba(38,139,210,0.25)',
      '--wos-font':              'system-ui,-apple-system,sans-serif',
      '--wos-desktop-icon-hover-bg': 'rgba(38,139,210,0.15)',
      '--wos-dock-item-hover-bg':    'rgba(38,139,210,0.12)',
    },
  },
};

const coreValues    = Object.assign({}, PRESETS.dark.core);
const desktopValues = Object.assign({}, PRESETS.dark.desktop);

/* ── Helpers ────────────────────────────────────────────── */
function rgbToHex(r, g, b) {
  return '#' + [r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}
function colorStrToHex(val) {
  val = val.trim();
  if (/^#[0-9a-fA-F]{3,8}$/.test(val)) {
    let h = val.replace('#','');
    if (h.length===3) h = h.split('').map(c=>c+c).join('');
    return '#' + h.slice(0,6);
  }
  const m = val.match(/rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/);
  if (m) return rgbToHex(+m[1],+m[2],+m[3]);
  return '#888888';
}

function applyVar(name, value) {
  document.documentElement.style.setProperty(name, value);
}
function applyAllVars(obj) { Object.entries(obj).forEach(([n,v]) => applyVar(n,v)); }

/* ── Build editor panel (generic) ───────────────────────── */
function buildEditor(containerId, varDefs, values) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  varDefs.forEach(group => {
    const gEl = document.createElement('div'); gEl.className = 'var-group';
    const tEl = document.createElement('div'); tEl.className = 'var-group-title';
    tEl.textContent = group.group; gEl.appendChild(tEl);
    group.vars.forEach(v => {
      const row = document.createElement('div'); row.className = 'var-row';
      const lEl = document.createElement('div'); lEl.className = 'var-label';
      lEl.textContent = v.name; lEl.title = v.tip; row.appendChild(lEl);
      const iEl = document.createElement('div'); iEl.className = 'var-inputs';
      if (v.type === 'color') {
        const ci = document.createElement('input'); ci.type = 'color';
        ci.id = 'ci-' + v.name.replace(/--/g,'').replace(/-/g,'_');
        ci.value = colorStrToHex(values[v.name] || '#888888');
        const hi = document.createElement('input'); hi.type = 'text'; hi.className = 'hex-input';
        hi.id = 'hi-' + v.name.replace(/--/g,'').replace(/-/g,'_');
        hi.value = colorStrToHex(values[v.name] || '#888888');
        hi.maxLength = 9; hi.spellcheck = false;
        ci.addEventListener('input', () => { hi.value = ci.value; values[v.name] = ci.value; applyVar(v.name, ci.value); refreshDesktopPreview(); });
        hi.addEventListener('input', () => {
          const val = hi.value.trim();
          if (/^#[0-9a-fA-F]{6}$/.test(val)) ci.value = val;
          values[v.name] = val; applyVar(v.name, val); refreshDesktopPreview();
        });
        hi.addEventListener('blur', () => {
          if (/^#/.test(hi.value.trim())) { const n = colorStrToHex(hi.value.trim()); hi.value = n; ci.value = n; values[v.name] = n; applyVar(v.name, n); refreshDesktopPreview(); }
        });
        iEl.appendChild(ci); iEl.appendChild(hi);
      } else {
        const ti = document.createElement('input'); ti.type = 'text'; ti.className = 'text-input';
        ti.id = 'ti-' + v.name.replace(/--/g,'').replace(/-/g,'_');
        ti.value = values[v.name] || ''; ti.spellcheck = false;
        const pv = document.createElement('span'); pv.className = 'var-preview';
        pv.id = 'pv-' + v.name.replace(/--/g,'').replace(/-/g,'_');
        pv.style.background = values[v.name] || '';
        ti.addEventListener('input', () => {
          values[v.name] = ti.value; applyVar(v.name, ti.value);
          pv.style.background = ti.value; refreshDesktopPreview();
        });
        iEl.appendChild(pv); iEl.appendChild(ti);
      }
      row.appendChild(iEl); gEl.appendChild(row);
    });
    container.appendChild(gEl);
  });
}

function syncEditorToValues(containerId, varDefs, values) {
  varDefs.forEach(group => {
    group.vars.forEach(v => {
      const id = v.name.replace(/--/g,'').replace(/-/g,'_');
      if (v.type === 'color') {
        const ci = document.getElementById('ci-' + id);
        const hi = document.getElementById('hi-' + id);
        if (ci && hi) { const hex = colorStrToHex(values[v.name]||'#888'); ci.value = hex; hi.value = hex; }
      } else {
        const ti = document.getElementById('ti-' + id);
        const pv = document.getElementById('pv-' + id);
        if (ti) { ti.value = values[v.name] || ''; if (pv) pv.style.background = ti.value; }
      }
    });
  });
}

/* ── Core preview (WindowManager) ───────────────────────── */
let corewm = null;
function initCorePreview() {
  const container = document.getElementById('core-preview-area');
  corewm = new WebOS.WindowManager({ container, isolated: true, snap: false });

  corewm.open({ id: 'prev-main', title: '📝 示範視窗 — 即時主題預覽', width: 460, height: 280, x: 40, y: 30,
    content: (() => {
      const el = document.createElement('div');
      el.style.cssText = 'padding:16px;font-size:13px;line-height:1.8;color:inherit';
      el.innerHTML = `<p style="opacity:.8;margin-bottom:8px">視窗樣式由左側 CSS 變數即時控制。</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button onclick="corewm.minimize('prev-main')" style="padding:5px 12px;border-radius:5px;border:1px solid var(--wos-border);background:var(--wos-btn-hover-bg);color:var(--wos-title-color);cursor:pointer;font-size:12px">最小化</button>
          <button onclick="corewm.maximize('prev-main')" style="padding:5px 12px;border-radius:5px;border:1px solid var(--wos-border);background:var(--wos-btn-hover-bg);color:var(--wos-title-color);cursor:pointer;font-size:12px">最大化</button>
          <button onclick="corewm.restore('prev-main')"  style="padding:5px 12px;border-radius:5px;border:1px solid var(--wos-border);background:var(--wos-btn-hover-bg);color:var(--wos-title-color);cursor:pointer;font-size:12px">還原</button>
        </div>`;
      return el;
    })()
  });
  corewm.open({ id: 'prev-sub', title: '⚙️ 設定', width: 240, height: 160, x: 540, y: 60,
    content: (() => {
      const el = document.createElement('div');
      el.style.cssText = 'padding:14px;font-size:12px;opacity:.7;line-height:1.8';
      el.textContent = '次要視窗示範。邊框、陰影、標題列樣式均由左側 CSS 變數控制。';
      return el;
    })()
  });
}

/* ── Desktop preview (Mock or real) ─────────────────────── */
let desktopLoaded = false;
let realDesktop = null;
let realWm = null;

function buildMockPreview() {
  const area = document.getElementById('desktop-preview-area');
  area.innerHTML = `
    <div class="desktop-mock">
      <div class="mock-icon" style="top:20px;left:20px"><span>📁</span><span class="mock-icon-label">檔案總管</span></div>
      <div class="mock-icon" style="top:20px;left:110px"><span>📝</span><span class="mock-icon-label">文字編輯</span></div>
      <div class="mock-icon" style="top:120px;left:20px"><span>🌐</span><span class="mock-icon-label">瀏覽器</span></div>
      <div class="mock-icon" style="top:120px;left:110px"><span>⚙️</span><span class="mock-icon-label">系統設定</span></div>
      <div class="mock-dock">
        <div class="mock-dock-item"><span>📁</span><span class="mock-dock-label">檔案</span></div>
        <div class="mock-dock-item"><span>📝</span><span class="mock-dock-label">文字</span></div>
        <div class="mock-dock-item"><span>🌐</span><span class="mock-dock-label">網路</span></div>
        <div class="mock-dock-item"><span>🔢</span><span class="mock-dock-label">計算</span></div>
        <div class="mock-dock-item"><span>⚙️</span><span class="mock-dock-label">設定</span></div>
        <div class="mock-dock-item"><span>💻</span><span class="mock-dock-label">終端</span></div>
      </div>
    </div>`;
}

function refreshDesktopPreview() {
  if (!desktopLoaded) return; // mock refreshes via CSS vars automatically
}

function buildRealDesktop() {
  const area = document.getElementById('desktop-preview-area');
  area.innerHTML = '';

  const dockPos = document.getElementById('dock-position-select').value;
  const showLabels = document.getElementById('dock-labels-toggle').checked;

  realDesktop = new WebOSDesktop.Desktop({
    container: area,
    dock: {
      position: dockPos, showLabels: showLabels, iconSize: 40,
      items: [
        { id: 'df', label: '檔案總管', icon: '📁', action: () => openPreviewApp('finder') },
        { id: 'de', label: '文字編輯', icon: '📝', action: () => openPreviewApp('editor') },
        { id: 'db', label: '瀏覽器',   icon: '🌐', action: () => openPreviewApp('browser') },
        { id: 'ds', label: '設定',     icon: '⚙️', action: () => openPreviewApp('settings') },
      ],
    },
    icons: [
      { id: 'if', label: '檔案總管', icon: '📁', action: () => openPreviewApp('finder') },
      { id: 'ie', label: '文字編輯', icon: '📝', action: () => openPreviewApp('editor') },
      { id: 'im', label: '音樂',     icon: '🎵', action: () => openPreviewApp('music') },
      { id: 'ip', label: '相簿',     icon: '🖼️', action: () => openPreviewApp('photo') },
    ],
  });

  realWm = new WebOS.WindowManager({ container: realDesktop.getElement(), isolated: true, snap: true });

  document.getElementById('desktop-preview-status').style.cssText =
    'font-size:11px;margin-left:auto;padding:2px 8px;border-radius:10px;background:rgba(34,197,94,.15);color:#86efac';
  document.getElementById('desktop-preview-status').textContent = '真實預覽';
}

function openPreviewApp(id) {
  if (!realWm) return;
  const defs = {
    finder:   { title: '📁 檔案總管', width: 400, height: 300 },
    editor:   { title: '📝 文字編輯', width: 380, height: 280 },
    browser:  { title: '🌐 瀏覽器',   width: 460, height: 320 },
    settings: { title: '⚙️ 系統設定', width: 320, height: 240 },
    music:    { title: '🎵 音樂',     width: 260, height: 220 },
    photo:    { title: '🖼️ 相簿',     width: 360, height: 280 },
  };
  const def = defs[id]; if (!def) return;
  const el = document.createElement('div');
  el.style.cssText = 'padding:16px;font-size:13px;opacity:.75;line-height:1.8';
  el.textContent = def.title + ' — Desktop 模組示範視窗';
  realWm.open({ id: 'preview-' + id, title: def.title, width: def.width, height: def.height, x: 60, y: 40, content: el });
}

/* ── Tab switching ───────────────────────────────────────── */
document.getElementById('main-tab-bar').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  const tab = btn.dataset.tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === 'pane-' + tab));
});

/* ── Load desktop JS on demand ───────────────────────────── */
document.getElementById('btn-load-desktop').addEventListener('click', function() {
  if (desktopLoaded) return;
  this.textContent = '⏳ 載入中...'; this.disabled = true;
  const s = document.createElement('script');
  s.src = '../../dist/webos-desktop.umd.js';
  s.onload = () => {
    desktopLoaded = true;
    document.getElementById('desktop-notice').innerHTML =
      '<span>✅ webos-desktop.umd.js 已載入，顯示真實 Desktop 預覽。</span>';
    document.getElementById('dock-position-select').disabled = false;
    document.getElementById('dock-labels-toggle').disabled = false;
    buildRealDesktop();
    applyAllVars(desktopValues);
  };
  s.onerror = () => {
    this.textContent = '❌ 載入失敗'; this.disabled = false;
  };
  document.head.appendChild(s);
});

/* ── Export helpers ──────────────────────────────────────── */
function generateCSS(values, label) {
  const lines = ['/* WebOS-Core — ' + label + ' */', ':root {'];
  Object.entries(values).forEach(([n,v]) => lines.push('  ' + n.padEnd(32) + ': ' + v + ';'));
  lines.push('}');
  return lines.join('\n');
}
function showFeedback(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.style.opacity = '1';
  setTimeout(() => el.style.opacity = '0', 2500);
}
async function copyCSS(css, fbId) {
  try { await navigator.clipboard.writeText(css); }
  catch { const ta = document.createElement('textarea'); ta.value = css; ta.style.cssText='position:fixed;left:-9999px'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); }
  showFeedback(fbId, '✓ 已複製到剪貼簿！');
}
function downloadCSS(css, fname) {
  const url = URL.createObjectURL(new Blob([css], {type:'text/css'}));
  const a = document.createElement('a'); a.href = url; a.download = fname; a.click(); URL.revokeObjectURL(url);
  showFeedback('copy-feedback-core', '✓ 下載已開始！');
}

document.getElementById('btn-copy-core').addEventListener('click', () => copyCSS(generateCSS(coreValues,'Core Theme'), 'copy-feedback-core'));
document.getElementById('btn-download-core').addEventListener('click', () => { downloadCSS(generateCSS(coreValues,'Core Theme'),'webos-core-theme.css'); showFeedback('copy-feedback-core','✓ 下載已開始！'); });
document.getElementById('btn-copy-desktop').addEventListener('click', () => copyCSS(generateCSS(desktopValues,'Desktop Theme'), 'copy-feedback-desktop'));
document.getElementById('btn-download-desktop').addEventListener('click', () => { downloadCSS(generateCSS(desktopValues,'Desktop Theme'),'webos-desktop-theme.css'); showFeedback('copy-feedback-desktop','✓ 下載已開始！'); });

/* ── Presets ─────────────────────────────────────────────── */
['dark','light','blue','solarized'].forEach(key => {
  const btn = document.getElementById('btn-preset-' + key);
  if (!btn) return;
  btn.addEventListener('click', () => {
    Object.assign(coreValues,    PRESETS[key].core);
    Object.assign(desktopValues, PRESETS[key].desktop);
    applyAllVars(coreValues);
    applyAllVars(desktopValues);
    syncEditorToValues('core-editor-scroll',    CORE_VAR_DEFS,    coreValues);
    syncEditorToValues('desktop-editor-scroll', DESKTOP_VAR_DEFS, desktopValues);
  });
});

/* ── Background select (core tab) ───────────────────────── */
document.getElementById('bg-select-core').addEventListener('change', e => {
  document.getElementById('core-preview-area').className = e.target.value;
});

/* ── Desktop toolbar controls ────────────────────────────── */
function rebuildRealDesktop() {
  if (!desktopLoaded) return;
  buildRealDesktop();
  applyAllVars(desktopValues);
}
document.getElementById('dock-position-select').addEventListener('change', rebuildRealDesktop);
document.getElementById('dock-labels-toggle').addEventListener('change', rebuildRealDesktop);

/* ── Init ─────────────────────────────────────────────────── */
applyAllVars(coreValues);
applyAllVars(desktopValues);
buildEditor('core-editor-scroll',    CORE_VAR_DEFS,    coreValues);
buildEditor('desktop-editor-scroll', DESKTOP_VAR_DEFS, desktopValues);
buildMockPreview();
initCorePreview();
</script>
