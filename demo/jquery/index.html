<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeskPane — jQuery Demo</title>
  <meta name="description" content="jQuery and UMD DeskPane demo focused on Desktop, Dock, WindowManager, WorkspaceManager, TaskView, child windows, modal dialogs, snap, and BorderLayout." />
  <link rel="canonical" href="https://0obriano0.github.io/DeskPane/demo/jquery/" />
  <meta property="og:title" content="DeskPane jQuery Demo" />
  <meta property="og:description" content="DeskPane UMD and jQuery demo focused on web desktop window management APIs." />
  <meta property="og:url" content="https://0obriano0.github.io/DeskPane/demo/jquery/" />
  <meta name="twitter:card" content="summary" />
  <link rel="stylesheet" href="../../dist/themes/dark.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #020617; }
    #desktop-root { width: 100vw; height: 100vh; }
    .demo-github-link {
      position: fixed; right: 14px; bottom: 84px; z-index: 30000;
      min-height: 32px; padding: 0 12px; display: inline-flex; align-items: center;
      border: 1px solid rgba(255,255,255,0.18); border-radius: 8px;
      background: rgba(15,23,42,0.72); color: #e2e8f0; text-decoration: none;
      font: 700 12px system-ui, sans-serif; backdrop-filter: blur(14px);
    }
    .demo-github-link:hover { background: rgba(30,41,59,0.86); border-color: rgba(96,165,250,0.6); }
    .panel {
      height: 100%; overflow: auto; padding: 16px; color: #e2e8f0;
      background: var(--dp-window-body-bg, #111827);
      font: 13px/1.55 system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    .panel h2 { margin: 0 0 10px; font-size: 17px; }
    .panel h3 { margin: 16px 0 8px; font-size: 13px; color: #93c5fd; text-transform: uppercase; letter-spacing: .08em; }
    .muted { color: rgba(226,232,240,.62); }
    .grid { display: grid; gap: 10px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .card {
      padding: 12px; border: 1px solid rgba(148,163,184,.18); border-radius: 8px;
      background: rgba(255,255,255,.045);
    }
    .card strong { display: block; margin-bottom: 4px; color: #f8fafc; }
    .btn-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .btn {
      min-height: 32px; padding: 0 12px; border: 1px solid rgba(148,163,184,.24);
      border-radius: 7px; background: rgba(255,255,255,.07); color: #e2e8f0;
      cursor: pointer; font: 700 12px system-ui, sans-serif;
    }
    .btn:hover { border-color: rgba(96,165,250,.58); background: rgba(59,130,246,.18); }
    .btn.primary { border-color: rgba(59,130,246,.54); background: rgba(59,130,246,.24); color: #dbeafe; }
    .btn.danger { border-color: rgba(239,68,68,.5); background: rgba(239,68,68,.18); color: #fecaca; }
    .field { display: grid; grid-template-columns: 130px 1fr; gap: 10px; align-items: center; margin: 8px 0; }
    .field input {
      width: 100%; height: 32px; border: 1px solid rgba(148,163,184,.24); border-radius: 7px;
      padding: 0 10px; background: rgba(15,23,42,.72); color: #e2e8f0;
    }
    .event-log {
      max-height: 160px; overflow: auto; margin-top: 8px; padding: 10px;
      border-radius: 7px; background: rgba(2,6,23,.55); font: 11px/1.55 "Cascadia Code", Consolas, monospace;
    }
    .event-log div { color: #86efac; }
    code, pre {
      font-family: "Cascadia Code", Consolas, monospace;
      background: rgba(2,6,23,.55); color: #93c5fd; border-radius: 6px;
    }
    code { padding: 1px 5px; }
    pre { padding: 10px; overflow: auto; font-size: 11px; }
    .layout-cell {
      height: 100%; display: grid; place-items: center; color: rgba(226,232,240,.6);
      background: rgba(255,255,255,.035); font-size: 12px; user-select: none;
    }
  </style>
</head>
<body>
  <a class="demo-github-link" href="https://github.com/0obriano0/DeskPane" target="_blank" rel="noopener">GitHub</a>
  <div id="desktop-root"></div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="../../dist/deskpane.umd.js"></script>
  <script src="../../dist/deskpane-desktop.umd.js"></script>
  <script src="../../dist/deskpane-workspace.umd.js"></script>
  <script>
    const { BorderLayout, setTheme } = DeskPane;
    const { Desktop } = DeskPaneDesktop;
    const { WorkspaceManager, TaskView } = DeskPaneWorkspace;

    const desktop = new Desktop({
      container: document.getElementById('desktop-root'),
      dragThreshold: 10,
      dock: { position: 'bottom', showLabels: true, iconSize: 44, items: [] },
      icons: [
        { id: 'icon-overview', label: 'Overview', icon: '💙', x: 40, y: 40, action: () => openApp('overview') },
        { id: 'icon-window-lab', label: 'Window Lab', icon: '🪟', x: 40, y: 140, action: () => openApp('window-lab') },
        { id: 'icon-layout', label: 'BorderLayout', icon: '📐', x: 40, y: 240, action: () => openApp('layout') },
        { id: 'icon-children', label: 'Child Windows', icon: '🔗', x: 170, y: 40, action: () => openApp('children') },
        { id: 'icon-events', label: 'Events', icon: '📡', x: 170, y: 140, action: () => openApp('events') },
      ],
    });

    const workspaces = new WorkspaceManager(desktop.getElement(), {
      animationMs: 220,
      windowManagerOptions: { isolated: true, snap: true },
    });
    workspaces.addWorkspace({ id: 'ws-1', label: '桌面 1' });
    desktop.syncDockWithWindows(workspaces.getWindowManager('ws-1'));
    workspaces.events.on('workspace:switched', ({ to }) => {
      desktop.syncDockWithWindows(workspaces.getWindowManager(to));
      currentWm().activateTopWindow();
    });
    const taskView = new TaskView(workspaces, { dock: desktop.getDock() });

    function currentWm() {
      const current = workspaces.current;
      if (!current) throw new Error('No active workspace');
      return workspaces.getWindowManager(current.id);
    }

    function panel(title, $body) {
      return $('<div class="panel">').append($('<h2>').text(title), $body)[0];
    }

    function card(title, text) {
      return $('<div class="card">').append($('<strong>').text(title), $('<span class="muted">').text(text));
    }

    function openApp(id) {
      const def = apps[id];
      if (!def) return;
      currentWm().open({
        id: 'app-' + id,
        title: def.title,
        icon: def.icon,
        label: def.label,
        width: def.width,
        height: def.height,
        x: def.x,
        y: def.y,
        resizable: def.resizable,
        slotType: 'dom',
        content: def.make(),
      });
    }

    function makeOverview() {
      const $grid = $('<div class="grid">').append(
        card('UMD modules', 'DeskPane is loaded from script tags and available on window.DeskPane.'),
        card('jQuery content', 'Window contents are built with jQuery and passed as HTMLElement content.'),
        card('Desktop + Dock', 'Desktop icons open windows; WindowManager events keep the Dock in sync.'),
        card('WorkspaceManager', 'Task View can add and switch virtual desktops without framework state.'),
        card('Child windows', 'parentId and modal behavior work with jQuery-created content.'),
        card('BorderLayout', 'DeskPane layout components can be mounted inside jQuery-built DOM.'),
      );
      const $code = $('<pre>').text(`const desktop = new DeskPaneDesktop.Desktop({ container, icons })
const wm = workspaceManager.getWindowManager('ws-1')
wm.open({ title: 'jQuery content', content: $panel[0] })`);
      const $body = $('<div>').append(
        $('<p class="muted">').text('This demo intentionally focuses on DeskPane integration points. jQuery is only used to create and bind window content.'),
        $('<h3>').text('What is active here'),
        $grid,
        $('<h3>').text('jQuery integration shape'),
        $code,
      );
      return panel('jQuery + DeskPane Demo', $body);
    }

    function makeWindowLab() {
      const $gap = $('<input type="number" min="0" max="48" value="0">').on('input', () => currentWm().setSnapGap(Number($gap.val()) || 0));
      const $body = $('<div>').append(
        $('<p class="muted">').text('These jQuery buttons call WindowManager methods against this window.'),
        $('<div class="field">').append($('<span>').text('Snap gap'), $gap),
        $('<div class="btn-row">').append(
          $('<button class="btn">').text('Minimize').on('click', () => currentWm().minimize('app-window-lab')),
          $('<button class="btn">').text('Maximize').on('click', () => currentWm().maximize('app-window-lab')),
          $('<button class="btn">').text('Restore').on('click', () => currentWm().restore('app-window-lab')),
          $('<button class="btn">').text('Shake').on('click', () => currentWm().shake('app-window-lab')),
          $('<button class="btn primary">').text('Open snap probe').on('click', openFloatingProbe),
          $('<button class="btn danger">').text('Close').on('click', () => currentWm().close('app-window-lab')),
        ),
        $('<h3>').text('Try it'),
        $('<p class="muted">').text('Open the snap probe and drag it near this window. Change snap gap, then drag again.'),
      );
      return panel('WindowManager Lab', $body);
    }

    function openFloatingProbe() {
      currentWm().open({
        id: 'snap-probe-' + Date.now(),
        title: 'Snap probe',
        width: 260,
        height: 150,
        x: 520,
        y: 120,
        content: panel('Snap probe', $('<p class="muted">').text('Drag this window near another window to see snap alignment and gap behavior.')),
      });
    }

    function makeLayoutDemo() {
      const $root = $('<div>').css({ width: '100%', height: '100%', position: 'relative', fontFamily: 'system-ui', fontSize: '13px' });
      $root.append(
        region('north', '64', 'Toolbar', 'North toolbar'),
        region('west', '170', 'Navigation', 'West panel', true),
        region('east', '150', 'Inspector', 'East panel', true),
        region('south', '58', 'Status', 'South status'),
        region('center', '', 'Main', 'Center workspace'),
      );
      setTimeout(() => new BorderLayout({ container: $root[0] }), 0);
      return $root[0];
    }

    function region(name, size, title, label, collapsible = false) {
      const $node = $('<div>').attr({ 'data-region': name, 'data-title': title });
      if (size) $node.attr('data-size', size);
      if (collapsible) $node.attr('data-collapsible', '');
      return $node.append($('<div class="layout-cell">').text(label));
    }

    function makeChildrenDemo() {
      const $body = $('<div>').append(
        $('<p class="muted">').text('This parent window opens modal and non-modal children with parentId. Children stay above the parent and do not get standalone Dock items.'),
        $('<div class="btn-row">').append(
          $('<button class="btn primary">').text('Open modal child').on('click', openModalChild),
          $('<button class="btn">').text('Open non-modal child').on('click', openNonModalChild),
        ),
        $('<h3>').text('Behavior'),
        $('<div class="grid">').append(
          card('Modal child', 'Parent receives an overlay; clicking it shakes the modal child.'),
          card('Non-modal child', 'Parent and child can both be focused, but Dock still groups them.'),
        ),
      );
      return panel('Parent / Child Window Demo', $body);
    }

    function openModalChild() {
      currentWm().open({
        id: 'child-modal',
        title: 'Modal child',
        parentId: 'app-children',
        modal: true,
        width: 340,
        height: 210,
        resizable: false,
        content: panel('Modal child', $('<div>').append(
          $('<p class="muted">').text('The parent is blocked until this modal child closes.'),
          $('<div class="btn-row">').append($('<button class="btn primary">').text('Close modal').on('click', () => currentWm().close('child-modal'))),
        )),
      });
    }

    function openNonModalChild() {
      currentWm().open({
        id: 'child-inspector',
        title: 'Non-modal child',
        parentId: 'app-children',
        modal: false,
        width: 320,
        height: 230,
        content: panel('Non-modal child', $('<p class="muted">').text('This child stays attached to the parent, but the parent remains interactive.')),
      });
    }

    function makeEventsDemo() {
      const $log = $('<div class="event-log">');
      const add = text => {
        $log.prepend($('<div>').text(new Date().toLocaleTimeString('zh-TW', { hour12: false }) + '  ' + text));
        $log.children().slice(30).remove();
      };
      const wm = currentWm();
      ['window:opened','window:closed','window:focused','window:minimized','window:maximized','window:restored'].forEach(eventName => {
        wm.events.on(eventName, payload => add(`${eventName} ${payload.id || payload.title || ''}`));
      });
      setTimeout(() => add('event monitor attached'), 0);
      const $body = $('<div>').append(
        $('<p class="muted">').text('Open, focus, minimize, maximize, restore, and close windows to see WindowManager events.'),
        $('<div class="btn-row">').append(
          $('<button class="btn primary">').text('Open probe window').on('click', openFloatingProbe),
          $('<button class="btn">').text('Open Task View').on('click', () => taskView.open()),
        ),
        $log,
      );
      return panel('Event Monitor', $body);
    }

    const apps = {
      overview: { title: '💙 Overview', label: 'Overview', icon: '💙', width: 560, height: 430, x: 80, y: 54, make: makeOverview },
      'window-lab': { title: '🪟 Window Lab', label: 'Window Lab', icon: '🪟', width: 480, height: 330, x: 150, y: 90, make: makeWindowLab },
      layout: { title: '📐 BorderLayout', label: 'BorderLayout', icon: '📐', width: 720, height: 460, x: 180, y: 70, make: makeLayoutDemo },
      children: { title: '🔗 Child Windows', label: 'Child Windows', icon: '🔗', width: 500, height: 330, x: 220, y: 110, make: makeChildrenDemo },
      events: { title: '📡 Event Monitor', label: 'Events', icon: '📡', width: 480, height: 360, x: 260, y: 130, make: makeEventsDemo },
    };

    setTheme('dark', { basePath: '../../dist/themes' });
    openApp('overview');
  </script>
</body>
</html>
