<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeskPane — Vanilla JS Demo</title>
  <meta name="description" content="Plain JavaScript DeskPane demo focused on Desktop, WindowManager, WorkspaceManager, TaskView, Dock sync, child windows, modal dialogs, snap, and BorderLayout." />
  <link rel="canonical" href="https://0obriano0.github.io/DeskPane/demo/vanilla/" />
  <meta property="og:title" content="DeskPane Vanilla JavaScript Demo" />
  <meta property="og:description" content="Framework-free DeskPane demo focused on core web desktop window management APIs." />
  <meta property="og:url" content="https://0obriano0.github.io/DeskPane/demo/vanilla/" />
  <meta name="twitter:card" content="summary" />
  <link rel="stylesheet" href="../../dist/themes/dark.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #020617; }
    #desktop-root { width: 100vw; height: 100vh; }
    .demo-github-link {
      position: fixed; right: 14px; bottom: 84px; z-index: 30000;
      min-height: 32px; padding: 0 12px; display: inline-flex; align-items: center;
      border: 1px solid rgba(255,255,255,0.18); border-radius: 8px;
      background: rgba(15,23,42,0.72); color: #e2e8f0; text-decoration: none;
      font: 700 12px system-ui, sans-serif; backdrop-filter: blur(14px);
    }
    .demo-github-link:hover { background: rgba(30,41,59,0.86); border-color: rgba(96,165,250,0.6); }
    .panel {
      height: 100%; overflow: auto; padding: 16px; color: #e2e8f0;
      background: var(--dp-window-body-bg, #111827);
      font: 13px/1.55 system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    .panel h2 { margin: 0 0 10px; font-size: 17px; }
    .panel h3 { margin: 16px 0 8px; font-size: 13px; color: #93c5fd; text-transform: uppercase; letter-spacing: .08em; }
    .muted { color: rgba(226,232,240,.62); }
    .grid { display: grid; gap: 10px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .card {
      padding: 12px; border: 1px solid rgba(148,163,184,.18); border-radius: 8px;
      background: rgba(255,255,255,.045);
    }
    .card strong { display: block; margin-bottom: 4px; color: #f8fafc; }
    .btn-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .btn {
      min-height: 32px; padding: 0 12px; border: 1px solid rgba(148,163,184,.24);
      border-radius: 7px; background: rgba(255,255,255,.07); color: #e2e8f0;
      cursor: pointer; font: 700 12px system-ui, sans-serif;
    }
    .btn:hover { border-color: rgba(96,165,250,.58); background: rgba(59,130,246,.18); }
    .btn.primary { border-color: rgba(59,130,246,.54); background: rgba(59,130,246,.24); color: #dbeafe; }
    .btn.danger { border-color: rgba(239,68,68,.5); background: rgba(239,68,68,.18); color: #fecaca; }
    .field { display: grid; grid-template-columns: 130px 1fr; gap: 10px; align-items: center; margin: 8px 0; }
    .field input, .field select {
      width: 100%; height: 32px; border: 1px solid rgba(148,163,184,.24); border-radius: 7px;
      padding: 0 10px; background: rgba(15,23,42,.72); color: #e2e8f0;
    }
    .event-log {
      max-height: 160px; overflow: auto; margin-top: 8px; padding: 10px;
      border-radius: 7px; background: rgba(2,6,23,.55); font: 11px/1.55 "Cascadia Code", Consolas, monospace;
    }
    .event-log div { color: #86efac; }
    code, pre {
      font-family: "Cascadia Code", Consolas, monospace;
      background: rgba(2,6,23,.55); color: #93c5fd; border-radius: 6px;
    }
    code { padding: 1px 5px; }
    pre { padding: 10px; overflow: auto; font-size: 11px; }
    .layout-cell {
      height: 100%; display: grid; place-items: center; color: rgba(226,232,240,.6);
      background: rgba(255,255,255,.035); font-size: 12px; user-select: none;
    }
  </style>
</head>
<body>
  <a class="demo-github-link" href="https://github.com/0obriano0/DeskPane" target="_blank" rel="noopener">GitHub</a>
  <div id="desktop-root"></div>

  <script type="module">
    import { BorderLayout, setTheme } from '../../dist/deskpane.es.js';
    import { Desktop } from '../../dist/deskpane-desktop.es.js';
    import { WorkspaceManager, TaskView } from '../../dist/deskpane-workspace.es.js';

    const root = document.getElementById('desktop-root');
    const desktop = new Desktop({
      container: root,
      dragThreshold: 10,
      dock: { position: 'bottom', showLabels: true, iconSize: 44, items: [] },
      icons: [
        { id: 'icon-overview', label: 'Overview', icon: '🖥', x: 40, y: 40, action: () => openApp('overview') },
        { id: 'icon-window-lab', label: 'Window Lab', icon: '🪟', x: 40, y: 140, action: () => openApp('window-lab') },
        { id: 'icon-layout', label: 'BorderLayout', icon: '📐', x: 40, y: 240, action: () => openApp('layout') },
        { id: 'icon-children', label: 'Child Windows', icon: '🔗', x: 170, y: 40, action: () => openApp('children') },
        { id: 'icon-events', label: 'Events', icon: '📡', x: 170, y: 140, action: () => openApp('events') },
      ],
    });

    const workspaces = new WorkspaceManager(desktop.getElement(), {
      animationMs: 220,
      windowManagerOptions: { isolated: true, snap: true },
    });
    workspaces.addWorkspace({ id: 'ws-1', label: '桌面 1' });
    desktop.syncDockWithWindows(workspaces.getWindowManager('ws-1'));
    workspaces.events.on('workspace:switched', ({ to }) => {
      desktop.syncDockWithWindows(workspaces.getWindowManager(to));
      currentWm().activateTopWindow();
    });
    const taskView = new TaskView(workspaces, { dock: desktop.getDock() });

    function currentWm() {
      const current = workspaces.current;
      if (!current) throw new Error('No active workspace');
      return workspaces.getWindowManager(current.id);
    }

    function el(tag, attrs = {}, children = []) {
      const node = document.createElement(tag);
      Object.entries(attrs).forEach(([key, value]) => {
        if (key === 'class') node.className = value;
        else if (key === 'style') node.style.cssText = value;
        else if (key.startsWith('on') && typeof value === 'function') node.addEventListener(key.slice(2), value);
        else node.setAttribute(key, value);
      });
      children.forEach(child => node.append(child instanceof Node ? child : document.createTextNode(child)));
      return node;
    }

    function panel(title, body) {
      return el('div', { class: 'panel' }, [el('h2', {}, [title]), body]);
    }

    function openApp(id) {
      const def = apps[id];
      if (!def) return;
      currentWm().open({
        id: 'app-' + id,
        title: def.title,
        icon: def.icon,
        label: def.label,
        width: def.width,
        height: def.height,
        x: def.x,
        y: def.y,
        resizable: def.resizable,
        slotType: 'dom',
        content: def.make(),
      });
    }

    function makeOverview() {
      const grid = el('div', { class: 'grid' }, [
        feature('Desktop', 'Icons are data-driven, draggable, and stored by Desktop.'),
        feature('Dock sync', 'Window events automatically update the Dock active/minimized state.'),
        feature('WorkspaceManager', 'Task View can add/switch virtual desktops without app code.'),
        feature('WindowManager', 'Open, focus, minimize, maximize, restore, snap, and close are all visible.'),
        feature('Child windows', 'parentId and modal behavior keep child windows attached to their parent.'),
        feature('BorderLayout', 'Region-based layout can be mounted inside any DeskPane window.'),
      ]);
      const code = el('pre', {}, [`const desktop = new Desktop({ container, icons })
const workspaces = new WorkspaceManager(desktop.getElement(), {
  windowManagerOptions: { isolated: true, snap: true }
})
desktop.syncDockWithWindows(workspaces.getWindowManager('ws-1'))
new TaskView(workspaces, { dock: desktop.getDock() })`]);
      const body = el('div', {}, [
        el('p', { class: 'muted' }, ['This demo uses only vanilla JavaScript and DeskPane modules. The content exists to exercise the DeskPane API, not to simulate unrelated applications.']),
        el('h3', {}, ['What is active here']),
        grid,
        el('h3', {}, ['Minimal setup']),
        code,
      ]);
      return panel('Vanilla DeskPane Demo', body);
    }

    function feature(title, text) {
      return el('div', { class: 'card' }, [el('strong', {}, [title]), el('span', { class: 'muted' }, [text])]);
    }

    function makeWindowLab() {
      const gapInput = el('input', { type: 'number', min: '0', max: '48', value: '0', oninput: () => currentWm().setSnapGap(Number(gapInput.value) || 0) });
      const body = el('div', {}, [
        el('p', { class: 'muted' }, ['Use these controls to exercise WindowManager methods against this window.']),
        el('div', { class: 'field' }, [el('span', {}, ['Snap gap']), gapInput]),
        el('div', { class: 'btn-row' }, [
          el('button', { class: 'btn', onclick: () => currentWm().minimize('app-window-lab') }, ['Minimize']),
          el('button', { class: 'btn', onclick: () => currentWm().maximize('app-window-lab') }, ['Maximize']),
          el('button', { class: 'btn', onclick: () => currentWm().restore('app-window-lab') }, ['Restore']),
          el('button', { class: 'btn', onclick: () => currentWm().shake('app-window-lab') }, ['Shake']),
          el('button', { class: 'btn primary', onclick: () => openFloatingProbe() }, ['Open snap probe']),
          el('button', { class: 'btn danger', onclick: () => currentWm().close('app-window-lab') }, ['Close']),
        ]),
        el('h3', {}, ['Try it']),
        el('p', { class: 'muted' }, ['Open the snap probe and drag it near this window. Change snap gap, then drag again.']),
      ]);
      return panel('WindowManager Lab', body);
    }

    function openFloatingProbe() {
      currentWm().open({
        id: 'snap-probe-' + Date.now(),
        title: 'Snap probe',
        width: 260,
        height: 150,
        x: 520,
        y: 120,
        content: panel('Snap probe', el('p', { class: 'muted' }, ['Drag this window near another window to see snap alignment and gap behavior.'])),
      });
    }

    function makeLayoutDemo() {
      const root = el('div', { style: 'width:100%;height:100%;position:relative;font-family:system-ui;font-size:13px' });
      root.append(
        region('north', '64', 'Toolbar', 'North toolbar'),
        region('west', '170', 'Navigation', 'West panel', true),
        region('east', '150', 'Inspector', 'East panel', true),
        region('south', '58', 'Status', 'South status'),
        region('center', '', 'Main', 'Center workspace'),
      );
      setTimeout(() => new BorderLayout({ container: root }), 0);
      return root;
    }

    function region(name, size, title, label, collapsible = false) {
      const node = el('div');
      node.dataset.region = name;
      node.dataset.title = title;
      if (size) node.dataset.size = size;
      if (collapsible) node.dataset.collapsible = '';
      node.append(el('div', { class: 'layout-cell' }, [label]));
      return node;
    }

    function makeChildrenDemo() {
      const body = el('div', {}, [
        el('p', { class: 'muted' }, ['This parent window opens modal and non-modal children with parentId. Children stay above the parent and do not get standalone Dock items.']),
        el('div', { class: 'btn-row' }, [
          el('button', { class: 'btn primary', onclick: () => openModalChild() }, ['Open modal child']),
          el('button', { class: 'btn', onclick: () => openNonModalChild() }, ['Open non-modal child']),
        ]),
        el('h3', {}, ['Behavior']),
        el('div', { class: 'grid' }, [
          feature('Modal child', 'Parent receives an overlay; clicking it shakes the modal child.'),
          feature('Non-modal child', 'Parent and child can both be focused, but Dock still groups them.'),
        ]),
      ]);
      return panel('Parent / Child Window Demo', body);
    }

    function openModalChild() {
      currentWm().open({
        id: 'child-modal',
        title: 'Modal child',
        parentId: 'app-children',
        modal: true,
        width: 340,
        height: 210,
        resizable: false,
        content: panel('Modal child', el('div', {}, [
          el('p', { class: 'muted' }, ['The parent is blocked until this modal child closes.']),
          el('div', { class: 'btn-row' }, [el('button', { class: 'btn primary', onclick: () => currentWm().close('child-modal') }, ['Close modal'])]),
        ])),
      });
    }

    function openNonModalChild() {
      currentWm().open({
        id: 'child-inspector',
        title: 'Non-modal child',
        parentId: 'app-children',
        modal: false,
        width: 320,
        height: 230,
        content: panel('Non-modal child', el('p', { class: 'muted' }, ['This child stays attached to the parent, but the parent remains interactive.'])),
      });
    }

    function makeEventsDemo() {
      const log = el('div', { class: 'event-log' });
      const add = text => {
        log.prepend(el('div', {}, [new Date().toLocaleTimeString('zh-TW', { hour12: false }) + '  ' + text]));
        while (log.children.length > 30) log.lastChild.remove();
      };
      const wm = currentWm();
      ['window:opened','window:closed','window:focused','window:minimized','window:maximized','window:restored'].forEach(eventName => {
        wm.events.on(eventName, payload => add(`${eventName} ${payload.id ?? payload.title ?? ''}`));
      });
      const body = el('div', {}, [
        el('p', { class: 'muted' }, ['Open, focus, minimize, maximize, restore, and close windows to see WindowManager events.']),
        el('div', { class: 'btn-row' }, [
          el('button', { class: 'btn primary', onclick: () => openFloatingProbe() }, ['Open probe window']),
          el('button', { class: 'btn', onclick: () => taskView.open() }, ['Open Task View']),
        ]),
        log,
      ]);
      setTimeout(() => add('event monitor attached'), 0);
      return panel('Event Monitor', body);
    }

    const apps = {
      overview: { title: '🖥 Overview', label: 'Overview', icon: '🖥', width: 560, height: 430, x: 80, y: 54, make: makeOverview },
      'window-lab': { title: '🪟 Window Lab', label: 'Window Lab', icon: '🪟', width: 480, height: 330, x: 150, y: 90, make: makeWindowLab },
      layout: { title: '📐 BorderLayout', label: 'BorderLayout', icon: '📐', width: 720, height: 460, x: 180, y: 70, make: makeLayoutDemo },
      children: { title: '🔗 Child Windows', label: 'Child Windows', icon: '🔗', width: 500, height: 330, x: 220, y: 110, make: makeChildrenDemo },
      events: { title: '📡 Event Monitor', label: 'Events', icon: '📡', width: 480, height: 360, x: 260, y: 130, make: makeEventsDemo },
    };

    setTheme('dark', { basePath: '../../dist/themes' });
    openApp('overview');
  </script>
</body>
</html>
