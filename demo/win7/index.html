<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeskPane — Windows 7 Style Desktop Demo</title>
  <meta name="description" content="A Windows 7 inspired DeskPane desktop demo with draggable icons, taskbar, start menu, windows, tree, tabs, grid, and monitor chart." />
  <link rel="canonical" href="https://0obriano0.github.io/DeskPane/demo/win7/" />
  <meta property="og:title" content="DeskPane Windows 7 Style Desktop Demo" />
  <meta property="og:description" content="A Windows 7 inspired web desktop built with DeskPane Desktop and WindowManager." />
  <meta property="og:url" content="https://0obriano0.github.io/DeskPane/demo/win7/" />
  <meta name="twitter:card" content="summary" />
  <link rel="stylesheet" href="../../dist/themes/win7.css" />
  <link rel="stylesheet" href="./win7.css" />
</head>
<body>
  <main id="win7-root" class="win7-shell" aria-label="DeskPane Windows 7 style desktop">
    <a class="win7-github" href="https://github.com/0obriano0/DeskPane" target="_blank" rel="noopener">GitHub</a>
    <div id="desktop-root" class="win7-desktop-root"></div>


    <footer class="win7-taskbar" aria-label="Windows 7 style taskbar">
      <button id="start-button" class="win7-start-button" type="button"><span></span>Start</button>
      <div class="taskbar-spacer"></div>
      <time id="win7-clock" class="win7-clock"></time>
    </footer>
  </main>

  <script type="module" src="./win7.js"></script>
</body>
</html>
